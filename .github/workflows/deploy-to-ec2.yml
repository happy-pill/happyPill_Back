name: Build & Deploy JAR (manual)

on:
  workflow_dispatch: #수동으로만 가능

jobs:
  pre_deploy:
    runs-on: ubuntu-latest
    outputs:
      timestamp: ${{ steps.time.outputs.timestamp }}
    steps:
      - name: Get current UTC timestamp
        id: time
        run: echo "timestamp=$(date -u +%s)" >> "$GITHUB_OUTPUT"


  deploy:
    runs-on: ubuntu-latest
    needs: pre_deploy
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission to Gradle
        run: chmod +x ./gradlew

      - name: Build JAR
        run: ./gradlew clean bootJar

      - name: Rename JAR with timestamp + short SHA
        run: |
          JAR=$(find build/libs -name "*.jar" | head -n 1)
          BASENAME=$(basename "${JAR%.jar}")
          TIMESTAMP="${{ needs.pre_deploy.outputs.timestamp }}"   
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          NEW_NAME="${BASENAME}-${TIMESTAMP}-${SHORT_SHA}.jar"
          mv "$JAR" "build/libs/$NEW_NAME"
          echo "RENAMED_JAR_NAME=$NEW_NAME" >> $GITHUB_ENV



      - name: Copy JAR to remote server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: build/libs/*.jar
          target: /home/${{ secrets.REMOTE_USER }}
          strip_components: 2
          overwrite: true

      - name: Execute remote deploy.sh via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            JAR_NAME="${{ env.RENAMED_JAR_NAME }}"
            USER_HOME="/home/${{ secrets.REMOTE_USER }}"
            
            SRC_PATH="$USER_HOME/$JAR_NAME"
            BACKUP_DIR="$USER_HOME/backup"
            TARGET_PATH="$USER_HOME/app.jar"
            
            echo "SOURCE JAR: $SRC_PATH"
            if [ ! -f "$SRC_PATH" ]; then
            echo "ERROR: source file not found" >&2
            exit 1
            fi
            
            echo "Creating backup dir: $BACKUP_DIR"
            mkdir -p "$BACKUP_DIR"
            echo "cp -v $SRC_PATH -> $BACKUP_DIR/"
            cp -v "$SRC_PATH" "$BACKUP_DIR/"
            echo "Backup dir contents:"
            ls -l "$BACKUP_DIR"
            
            echo "mv -v $SRC_PATH -> $TARGET_PATH"
            mv -v "$SRC_PATH" "$TARGET_PATH"
            echo "Deployed app.jar:"
            ls -l "$TARGET_PATH"
            
            echo "Restarting service"
            sudo systemctl restart happypill


  after_deploy:
    needs: [ pre_deploy,deploy ]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Health-check backend
        uses: ./.github/actions/health-check
        with:
          base_url: ${{ vars.HAPPYPILL_BACKEND_URL }}

      - name: Verify service restart timestamp (epoch)
        run: |
          PRE_TS=${{ needs.pre_deploy.outputs.timestamp }}
          echo "pre-deploy epoch: $PRE_TS"
          
          # 서비스가 반환하는  라고 가정
          RAW_MS=$(curl --silent --fail "${{ vars.HAPPYPILL_BACKEND_URL }}/started-at")
          STARTED_AT=$(( RAW_MS / 1000 ))
          
          echo "service started_at: $STARTED_AT"
          
          if [ "$STARTED_AT" -le "$PRE_TS" ]; then
            echo "ERROR: service did not restart (started_at <= pre-deploy)" >&2
            exit 1
          fi

          echo "OK: service restarted after deploy"
          
          DEPLOY_START_TIME=$(TZ=Asia/Seoul date -d "@$STARTED_AT" "+%Y-%m-%d %H:%M:%S %Z")
          echo "    DEPLOY started at (KST): DEPLOY_START_TIME"
          
          
          KST=$(TZ=Asia/Seoul date -d "@$STARTED_AT" "+%Y-%m-%d %H:%M:%S %Z")
          
          echo "##########################################"
          echo "    service started at (KST): $KST"
          echo "##########################################"





