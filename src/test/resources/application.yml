spring:
  profiles:
    active: test
  datasource:
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    url: jdbc:tc:postgresql:17:///testdb
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate.hibernate.format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: xxxxx@gmail.com
    password: xxxxx
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: smtp.gmail.com
    security:
      oauth2:
        client:
          registration:
            google:
              client-id: xxxxx
              client-secret: xxxxx
              authorization-grant-type: authorization_code
              redirect-uri: "xxxxx"

